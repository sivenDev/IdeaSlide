name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64
            macos_deployment_target: ""
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
            macos_deployment_target: "12.0"
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64
            macos_deployment_target: "12.0"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Enable ad-hoc signing fallback for unsigned macOS builds
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "Apple certificate configured; skipping ad-hoc signing fallback."
            exit 0
          fi

          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("src-tauri/tauri.conf.json")
          data = json.loads(path.read_text())
          data.setdefault("bundle", {}).setdefault("macOS", {})["signingIdentity"] = "-"
          path.write_text(json.dumps(data, indent=2) + "\n")
          PY

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_deployment_target }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: IdeaSlide ${{ github.ref_name }}
          releaseBody: See the assets below to download the installer for your platform.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
