name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/github-script@v7
        id: create
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `IdeaSlide ${context.ref.replace('refs/tags/', '')}`,
              body: [
                '## Installation',
                '',
                '| Platform | File |',
                '|----------|------|',
                '| macOS (Apple Silicon) | `.dmg` (aarch64) |',
                '| macOS (Intel) | `.dmg` (x64) |',
                '| Windows | `.msi` |',
                '',
                '### macOS',
                '',
                'This app is not notarized with Apple. On first launch macOS will block it. To open:',
                '',
                '1. **Right-click** the app → **Open** → click **Open** in the dialog',
                '2. Or go to **System Settings → Privacy & Security** → scroll down and click **Open Anyway**',
                '3. Or run in Terminal: `xattr -cr /Applications/IdeaSlide.app`',
                '',
                'This is only needed once. After that the app opens normally.',
                '',
                '### Windows',
                '',
                'Windows SmartScreen may show a warning. Click **More info** → **Run anyway**.',
              ].join('\n'),
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64
            macos_deployment_target: ""
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
            macos_deployment_target: "12.0"
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64
            macos_deployment_target: "12.0"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Check Apple signing configuration
        if: runner.os == 'macOS'
        id: signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "has_certs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_certs=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable ad-hoc signing for unsigned macOS builds
        if: runner.os == 'macOS' && steps.signing.outputs.has_certs == 'false'
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("src-tauri/tauri.conf.json")
          data = json.loads(path.read_text())
          data.setdefault("bundle", {}).setdefault("macOS", {})["signingIdentity"] = "-"
          path.write_text(json.dumps(data, indent=2) + "\n")
          PY

      - name: Build Tauri app (signed)
        if: runner.os != 'macOS' || steps.signing.outputs.has_certs == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_deployment_target }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: IdeaSlide ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }}

      - name: Build Tauri app (unsigned)
        if: runner.os == 'macOS' && steps.signing.outputs.has_certs == 'false'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_deployment_target }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: IdeaSlide ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }}
